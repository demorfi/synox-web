services:
  elastic:
    image: elasticsearch:7.17.9
    restart: always
    volumes:
      - elastic-data:/elasticsearch/data
    ports:
      - '9201:9200'
    environment:
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      "discovery.type": "single-node"
      "xpack.security.enabled": "false"
      "bootstrap.system_call_filter": "false"
      "ingest.geoip.downloader.enabled": "false"
      "http.host": "0.0.0.0"
      "transport.host": "127.0.0.1"
    networks:
      - net

  app:
    image: demorfi/synox-web:latest
    restart: always
    volumes:
      - storage:/synox-web/storage
      - files:/synox-web/public/files
    ports:
      - '8002:80'
      - '2346:2346'
    environment:
      APP_MODE: ${APP_MODE:-prod}
      CACHE_EXPIRE: ${CACHE_EXPIRE:-86400}
      ELASTIC_USE: true
      ELASTIC_HOST: elastic:9200
      WORKER_BROADCAST_HOST: ${WORKER_BROADCAST_HOST:-0.0.0.0}
      WORKER_BROADCAST_PORT: 2346
      WORKER_USE_SSL: ${WORKER_USE_SSL:-false}
      WORKER_SSL_CERT_PATH: ${WORKER_SSL_CERT_PATH:-null}
      WORKER_SSL_KEY_PATH: ${WORKER_SSL_KEY_PATH:-null}
    networks:
      - net
    depends_on:
      - elastic

volumes:
  elastic-data:
  storage:
  files:

networks:
  net:
    driver: bridge